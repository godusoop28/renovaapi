spring.application.name=renova

# --- Base de datos (H2 embebida, persistente en archivo) ---
spring.datasource.url=jdbc:h2:file:./data/renova;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- Acceso de administrador (sobreescribir con variables de entorno en produccion) ---
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:cambia-esta-clave}
admin.token-secret=${ADMIN_TOKEN_SECRET:cambia-este-secreto-por-uno-largo-y-aleatorio}
admin.token-ttl-minutes=${ADMIN_TOKEN_TTL_MINUTES:480}

# --- CORS: dominios permitidos para el frontend (separados por coma) ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

server.port=${PORT:8080}
