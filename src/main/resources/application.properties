spring.application.name=renova

server.port=${PORT:8080}

# --- Base de datos ---
# En produccion (Render), define SPRING_DATASOURCE_URL/USERNAME/PASSWORD/DRIVER
# apuntando a PostgreSQL (SPRING_DATASOURCE_DRIVER=org.postgresql.Driver).
# Sin esas variables, usa H2 embebida en archivo (desarrollo local).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/renova;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- Acceso de administrador (sobreescribir con variables de entorno en produccion) ---
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:cambia-esta-clave}
admin.token-secret=${ADMIN_TOKEN_SECRET:cambia-este-secreto-por-uno-largo-y-aleatorio}
admin.token-ttl-minutes=${ADMIN_TOKEN_TTL_MINUTES:480}

# --- CORS: dominios permitidos para el frontend (separados por coma) ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://renovainversiones.vercel.app}
